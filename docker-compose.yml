# TZ 16-bo'lim (DevOps): api, worker, postgres(+pgvector), redis, rabbitmq, minio, nginx.
# Barcha servislarda healthcheck bor; api migratsiya+seed dan keyin ko'tariladi.

services:
  postgres:
    image: pgvector/pgvector:pg16          # PostgreSQL 16 + pgvector (TZ 3-bo'lim)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-almaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-almaz}
      POSTGRES_DB: ${POSTGRES_DB:-almaz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-almaz} -d ${POSTGRES_DB:-almaz}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine                  # cache, permission cache, rate limit (TZ 3-bo'lim)
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management           # Celery broker + management UI (:15672)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio                     # S3-mos object storage (TZ 3/16-bo'lim)
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: .
    env_file: .env
    # Migratsiya -> seed -> server. Dev uchun qulay; prod'da migratsiya alohida qadam bo'ladi.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  # TZ 17: proaktiv qayta jalb — davriy vazifalar rejalashtiruvchisi
  beat:
    build: .
    env_file: .env
    command: celery -A app.celery_app:celery_app beat --loglevel=info
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  nginx:
    image: nginx:alpine                    # reverse proxy (TZ 16-bo'lim)
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
