# TZ 16: Nginx reverse proxy. Faza 7: xavfsizlik headerlari + rate limit + TLS tayyorligi.

# Rate limit zonasi (webhook/API himoyasi — TZ 15). IP bo'yicha.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    # Chek rasmi / media yuklash uchun yetarli limit
    client_max_body_size 20M;

    # --- Xavfsizlik headerlari (TZ 15) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HTTPS yoqilganда: Strict-Transport-Security (quyida TLS blokida)

    location / {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

