# ============================================================
# almaz.api.cognilabs.org — edge server bloklari.
# Serverda ~/CIMSFastApi/nginx/nginx.conf OXIRIGA qo'shiladi
# (cims_nginx 80/443 portlarning egasi — edge proxy shu yerda).
#
# 2 bosqich:
#   1) Avval faqat 80-blokni qo'shib reload qiling (sertifikat hali yo'q,
#      443-blok ssl fayl topolmay nginx yiqiladi).
#   2) certbot bilan sertifikat olingach, 443-blokni qo'shib yana reload.
# Backend: shu serverning 8090-porti (almaz_nginx -> almaz_api).
# ============================================================

# --- 1-BOSQICH: HTTP (ACME challenge + HTTPSga redirect) ---
server {
    listen 80;
    server_name almaz.api.cognilabs.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 2-BOSQICH: HTTPS (sertifikat olingandan KEYIN qo'shiladi) ---
server {
    listen 443 ssl;
    http2 on;
    server_name almaz.api.cognilabs.org;

    ssl_certificate     /etc/letsencrypt/live/almaz.api.cognilabs.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/almaz.api.cognilabs.org/privkey.pem;

    client_max_body_size 20M;   # chek rasmi / media yuklash

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://65.109.136.247:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
